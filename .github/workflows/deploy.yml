name: Deploy Koskidex

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/apps/Koskidex
            git fetch origin main
            git reset --hard origin/main
            docker compose down
            docker compose build
            # The backend now runs as a non-root user; make sure the persisted
            # data dir is owned by that user before starting (idempotent).
            docker compose run --rm --no-deps --user root --entrypoint sh backend \
              -c "chown -R koskidex:koskidex /data"
            docker compose up -d
