services:
  backend:
    build: .
    container_name: koskidex_backend
    ports:
      - "7700:7700"
    volumes:
      - ./data:/data
    restart: unless-stopped
    command: ["/app/koskidex", "--port", "7700", "--data-dir", "/data"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7700/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: koskidex_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  seeder:
    image: golang:1.23-alpine
    container_name: koskidex_seeder
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
      - ./data:/data
    restart: "no"
    command: >
      sh -c "if [ ! -f /data/wal.log ]; then
               echo 'First deployment detected. Automatically seeding 100,000 documents...';
               go run /scripts/seed.go -url http://backend:7700 -index massive -count 100000;
             else
               echo 'Data volume already exists (/data/wal.log). Skipping auto-seed.';
             fi"
